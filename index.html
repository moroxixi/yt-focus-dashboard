<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YT Focus Visual Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0d0d0d; color: #e5e5e5; }
        .sidebar-link:hover { background-color: #1a1a1a; color: #ef4444; }
        .video-item:hover { background-color: #1a1a1a; }
        html { scroll-behavior: smooth; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* CSS Tambahan untuk Memastikan Gambar Asli Rapi */
        .channel-avatar {
            object-fit: cover; /* Memastikan gambar memenuhi lingkaran tanpa gepeng */
            border-radius: 9999px; /* Membuat lingkaran sempurna */
            aspect-ratio: 1/1; /* Memastikan proporsi gambar tetap kotak sebelum dipotong lingkaran */
        }
    </style>
</head>
<body class="flex h-screen overflow-hidden font-sans antialiased">

    <aside class="w-68 border-r border-zinc-800 flex flex-col bg-black shadow-2xl">
        <div class="p-8 border-b border-zinc-800">
            <h1 class="text-2xl font-black text-red-600 tracking-tighter italic uppercase">YT <span class="text-white">Focus</span></h1>
            <p class="text-[9px] text-zinc-600 mt-1">List Video Favorite</p>
        </div>
        <nav id="sidebar-nav" class="flex-1 overflow-y-auto p-4 space-y-2 no-scrollbar">
            <p class="text-[10px] uppercase tracking-widest text-zinc-600 font-extrabold mb-5 px-3">Subscriber</p>
            </nav>
    </aside>

    <main class="flex-1 overflow-y-auto bg-zinc-950">
        <div id="loader" class="p-16 text-zinc-600 italic animate-pulse text-center mt-32 text-sm">
            Synchronizing data with your playlist...
        </div>
        
        <div id="video-content" class="max-w-6xl mx-auto p-12 pb-48">
            </div>
    </main>

    <script>
        const SHEETDB_URL = 'https://sheetdb.io/api/v1/u9qfmxgp0c16e';

        async function loadApp() {
            try {
                const response = await fetch(SHEETDB_URL);
                const data = await response.json();
                
                document.getElementById('loader').classList.add('hidden');
                
                const grouped = data.reduce((acc, obj) => {
                    const key = obj.channel;
                    // Kita ambil URL gambar dari kolom 'profile_photo_url' yang kamu isi di Sheets
                    if (!acc[key]) acc[key] = { items: [], photo: obj.profile_photo_url };
                    acc[key].items.push(obj);
                    return acc;
                }, {});

                renderApp(grouped);
            } catch (error) {
                console.error("Fetch error:", error);
                document.getElementById('loader').innerText = "Gagal memuat database. Periksa API URL atau koneksi internet.";
            }
        }

        function renderApp(groupedData) {
            const sidebar = document.getElementById('sidebar-nav');
            const content = document.getElementById('video-content');

            for (const channelName in groupedData) {
                const safeId = channelName.replace(/\s+/g, '-').toLowerCase();
                
                // INI PERUBAHAN UTAMANYA: Mengambil URL Gambar Asli dari Google Sheets
                const channelPhoto = groupedData[channelName].photo || 'https://www.gstatic.com/youtube/img/branding/youtubelogo_resizer_clr_96x68.png';

                // 1. Sidebar Item dengan Gambar Asli
                sidebar.innerHTML += `
                    <a href="#${safeId}" class="sidebar-link flex items-center gap-4 p-3 rounded-2xl transition-all text-sm font-medium text-zinc-300">
                        <img src="${channelPhoto}" class="channel-avatar w-10 h-10 border border-zinc-800" alt="${channelName}" onerror="this.src='https://www.gstatic.com/youtube/img/branding/youtubelogo_resizer_clr_96x68.png'">
                        <span class="truncate">${channelName}</span>
                    </a>
                `;

                // 2. Video List HTML
                let videoListHtml = '';
                groupedData[channelName].items.forEach(vid => {
                    let videoId = vid.url.includes('v=') ? vid.url.split('v=')[1].split('&')[0] : vid.url.split('be/')[1];
                    const embedUrl = `https://www.youtube.com/embed/${videoId}`;

                    videoListHtml += `
                        <div class="video-item group p-6 border-b border-zinc-900 transition-all">
                            <a href="${embedUrl}" target="_blank" class="flex items-center justify-between gap-6">
                                <div class="flex-1">
                                    <h3 class="text-lg font-medium text-zinc-100 group-hover:text-red-500 transition-colors line-clamp-2">
                                        ${vid.title}
                                    </h3>
                                    <span class="text-[9px] bg-zinc-800 text-zinc-500 px-3 py-1 rounded uppercase tracking-widest mt-3 inline-block">
                                        ${vid.category || 'Empty'}
                                    </span>
                                </div>
                                <span class="text-zinc-700 text-[10px] font-mono group-hover:text-red-500 hover:font-bold tracking-widest uppercase transition-all whitespace-nowrap">
                                    OPEN VIDEO ⟶
                                </span>
                            </a>
                        </div>
                    `;
                });

                // 3. Channel Header Section dengan Gambar Asli Lebih Besar
                content.innerHTML += `
                    <section id="${safeId}" class="mb-28 scroll-mt-10">
                        <div class="flex items-center gap-6 mb-10 pb-6 border-b border-zinc-900">
                            <img src="${channelPhoto}" class="channel-avatar w-24 h-24 border-4 border-black shadow-2xl" alt="${channelName}" onerror="this.src='https://www.gstatic.com/youtube/img/branding/youtubelogo_resizer_clr_96x68.png'">
                            <div>
                                <h2 class="text-4xl font-extrabold text-white uppercase tracking-tighter">${channelName}</h2>
                                <p class="text-zinc-500 text-sm mt-1">Favorite Content.</p>
                            </div>
                        </div>
                        <div class="bg-zinc-900/40 rounded-3xl border border-zinc-900 shadow-xl overflow-hidden">
                            ${videoListHtml}
                        </div>
                    </section>
                `;
            }
        }

        loadApp();
    </script>
</body>
</html>
