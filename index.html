<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
	<meta http-equiv="Pragma" content="no-cache" />
	<meta http-equiv="Expires" content="0" />
    <title>YT Focus Visual Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
		main {
    	-webkit-overflow-scrolling: touch;
		scroll-behavior: smooth;
		}

        body { background-color: #0d0d0d; color: #e5e5e5; }
        .sidebar-link:hover { background-color: #1a1a1a; color: #ef4444; }
        .video-item:hover { background-color: #1a1a1a; }
        html { scroll-behavior: smooth; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .channel-avatar {
            object-fit: cover;
            border-radius: 9999px;
            aspect-ratio: 1/1;
        }

		.note-box {
        background-color: rgba(255, 255, 255, 0.03);
        border-left: 2px solid #3f3f46; /* Warna zinc-700 */
    	}

        /* Transisi Sidebar */
        #sidebar {
            transition: transform 0.3s ease-in-out;
        }
        
        /* Overlay saat sidebar terbuka di mobile */
        #overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            z-index: 40;
        }
		#backToTop {
    	z-index: 9999;
    	cursor: pointer;
    	-webkit-tap-highlight-color: transparent; /* Menghapus kotak biru saat diklik di iOS */
}
    </style>
</head>
<body class="flex h-screen overflow-hidden font-sans antialiased">

    <div id="overlay" onclick="toggleSidebar()"></div>

    <aside id="sidebar" class="fixed inset-y-0 left-0 z-50 w-64 border-r border-zinc-800 flex flex-col bg-black shadow-2xl transform -translate-x-full lg:translate-x-0 lg:relative">
        <div class="p-6 border-b border-zinc-800 flex justify-between items-center">
            <div>
                <h1 class="text-xl font-black text-red-600 tracking-tighter italic uppercase text-center lg:text-left">YT <span class="text-white">Focus</span></h1>
                <p class="text-[9px] text-zinc-600 mt-1">List Video Favorite</p>
            </div>
            <button onclick="toggleSidebar()" class="lg:hidden text-zinc-400">
                ✕
            </button>
        </div>
        <nav id="sidebar-nav" class="flex-1 overflow-y-auto p-4 space-y-2 no-scrollbar">
            <p class="text-[10px] uppercase tracking-widest text-zinc-600 font-extrabold mb-5 px-3">Subscriber</p>
        </nav>
    </aside>

    <main class="flex-1 overflow-y-auto bg-zinc-950 flex flex-col">
        
        <header class="p-4 border-b border-zinc-900 bg-black flex items-center gap-4 sticky top-0 z-30">
            <button onclick="toggleSidebar()" class="p-2 hover:bg-zinc-800 rounded-lg transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
                </svg>
            </button>
            <h1 class="text-sm font-bold text-zinc-400 lg:hidden uppercase tracking-widest">Navigation</h1>
        </header>

        <div id="loader" class="p-16 text-zinc-600 italic animate-pulse text-center mt-32 text-sm">
            Synchronizing data with your playlist...
        </div>
        
        <div id="video-content" class="max-w-6xl mx-auto p-6 md:p-12 pb-48 w-full">
            </div>

			<button id="backToTop" onclick="scrollToTop()" 
    class="fixed bottom-6 right-6 z-50 p-4 bg-red-600 hover:bg-red-700 text-white rounded-full shadow-2xl transition-all opacity-0 translate-y-10 scale-0">
    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 10l7-7m0 0l7 7m-7-7v18" />
    </svg>
</button>
    </main>

	<script>
    const SHEETDB_URL = 'https://script.google.com/macros/s/AKfycbwqGaavCgzvmL7pIps4jR9TkqqBa14iXoR9kwsDcr9xTZKfVBNd6Q3tDBjaXwdKOodc/exec';

    // 1. Fungsi Scroll ke Atas yang lebih kompatibel
	function scrollToTop() {
	    const container = document.querySelector('main');
	    container.scrollTo({
	        top: 0,
	        behavior: 'smooth'
	    });
	}
	
	// 2. Listener Scroll dengan deteksi yang lebih luas
	const mainContainer = document.querySelector('main');
	const btn = document.getElementById('backToTop');
	
	mainContainer.addEventListener('scroll', function() {
	    // iOS terkadang butuh pengecekan yang lebih sensitif
	    const scrollPos = mainContainer.scrollTop;
	    
	    if (scrollPos > 300) {
	        // Gunakan Tailwind classes atau manipulasi style langsung
	        btn.style.opacity = "1";
	        btn.style.transform = "translateY(0) scale(1)";
	        btn.style.pointerEvents = "auto";
	    } else {
	        btn.style.opacity = "0";
	        btn.style.transform = "translateY(20px) scale(0)";
	        btn.style.pointerEvents = "none";
	    }
	}, { passive: true }); // Menambah performa scroll di iOS

    // Tampilkan tombol saat scroll ke bawah
    document.querySelector('main').addEventListener('scroll', function() {
        const btn = document.getElementById('backToTop');
        if (this.scrollTop > 500) {
            btn.classList.remove('opacity-0', 'translate-y-10', 'scale-0');
            btn.classList.add('opacity-100', 'translate-y-0', 'scale-100');
        } else {
            btn.classList.add('opacity-0', 'translate-y-10', 'scale-0');
            btn.classList.remove('opacity-100', 'translate-y-0', 'scale-100');
        }
    });

    function toggleSidebar() {
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');
        sidebar.classList.toggle('-translate-x-full');
        overlay.style.display = sidebar.classList.contains('-translate-x-full') ? 'none' : 'block';
    }

    async function loadApp() {
        try {
            const response = await fetch(SHEETDB_URL);
            const data = await response.json();

			const dataReal = data.filter(obj => 
            obj.title && obj.title.trim() !== "" &&
            obj.channel && obj.channel.trim() !== "" &&
            obj.url && obj.url.trim() !== ""
        );
            
            document.getElementById('loader').classList.add('hidden');

            const grouped = dataReal.reduce((acc, obj) => {
                const key = obj.channel;
                if (!acc[key]) acc[key] = { items: [], photo: obj.profile_photo_url };
                acc[key].items.push(obj);
                return acc;
            }, {});

            // 2. LOGIKA SORTING A-Z (Berdasarkan Nama Channel)
            const sortedChannels = Object.keys(grouped).sort().reduce((acc, key) => {
                acc[key] = grouped[key];
                return acc;
            }, {});

            renderApp(sortedChannels);
        } catch (error) {
            console.error("Fetch error:", error);
        }
    }

    function renderApp(groupedData) {
        const sidebarNav = document.getElementById('sidebar-nav');
        const content = document.getElementById('video-content');	
		// Tambahkan parameter unik di belakang URL gambar agar browser menganggapnya file baru

        sidebarNav.innerHTML = '<p class="text-[10px] uppercase tracking-widest text-zinc-600 font-extrabold mb-5 px-3">Subscriber</p>';
        content.innerHTML = '';

        for (const channelName in groupedData) {
			const cacheBuster = "?t=" + new Date().getTime(); 
			const channelPhoto = (groupedData[channelName].photo || 'https://www.gstatic.com/youtube/img/branding/youtubelogo_resizer_clr_96x68.png') + cacheBuster;
            const safeId = channelName.replace(/\s+/g, '-').toLowerCase();


            // Sidebar Item
            sidebarNav.innerHTML += `

                <a href="#${safeId}" onclick="if(window.innerWidth < 1024) toggleSidebar()" class="sidebar-link flex items-center gap-4 p-3 rounded-2xl transition-all text-sm font-medium text-zinc-300">
                    <img src="${channelPhoto}" class="channel-avatar w-10 h-10 border border-zinc-800" onerror="this.src='https://www.gstatic.com/youtube/img/branding/youtubelogo_resizer_clr_96x68.png'">
                    <span class="truncate">${channelName}</span>
                </a>
            `;

            let videoListHtml = '';
            groupedData[channelName].items.forEach(vid => {
                let videoId = vid.url.includes('v=') ? vid.url.split('v=')[1].split('&')[0] : vid.url.split('be/')[1];
                const embedUrl = `https://www.youtube.com/embed/${videoId}`;
                const noteHtml = vid.notes ? `
                    <div class="mt-3 p-2 px-3 text-[11px] text-zinc-400 italic leading-relaxed bg-white/5 border-l-2 border-zinc-700">
                        <span class="text-zinc-600 not-italic font-bold mr-1 uppercase text-[9px]">Note:</span> ${vid.notes}
                    </div>
                ` : '';

                videoListHtml += `
                    <div class="video-item group border-b border-zinc-900 transition-all p-4 md:p-6">
                        <div class="flex flex-col">
                            <a href="${embedUrl}" target="_blank" class="flex items-center justify-between gap-4">
                                <div class="flex-1">
                                    <h3 class="text-sm md:text-lg font-medium text-zinc-100 group-hover:text-red-500 transition-colors">${vid.title}</h3>
                                    <span class="text-[8px] md:text-[9px] bg-zinc-800 text-zinc-500 px-3 py-1 rounded uppercase tracking-widest mt-2 inline-block font-bold">${vid.category || 'Empty'}</span>
                                </div>
                                <span class="text-zinc-700 text-[9px] font-mono group-hover:text-red-500 whitespace-nowrap uppercase tracking-widest">Open ⟶</span>
                            </a>
                            ${noteHtml}
                        </div>
                    </div>
                `;
            });

            content.innerHTML += `
                <section id="${safeId}" class="mb-16 md:mb-28 scroll-mt-24">
                    <div class="flex items-center gap-4 md:gap-6 mb-6 md:mb-10 pb-4 border-b border-zinc-900">
                        <img src="${channelPhoto}" class="channel-avatar w-12 h-12 md:w-20 md:h-20 border-2 border-black shadow-xl" onerror="this.src='https://www.gstatic.com/youtube/img/branding/youtubelogo_resizer_clr_96x68.png'">
                        <div>
                            <h2 class="text-xl md:text-3xl font-extrabold text-white uppercase tracking-tighter">${channelName}</h2>
                            <p class="text-zinc-500 text-[10px] md:text-sm italic">Personal Curation</p>
                        </div>
                    </div>
                    <div class="bg-zinc-900/40 rounded-2xl md:rounded-3xl border border-zinc-900 shadow-xl overflow-hidden">
                        ${videoListHtml}
                    </div>
                </section>
            `;
        }
    }

    loadApp();
</script>

</body>
</html>
